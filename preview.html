<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الكتاب التفاعلي</title>

  <style>
    :root{
      --brand: #0b3d91;
      --bg: #eef2f7;
      --zoom: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      position: relative;
      direction: rtl;
    }

    .viewer-shell {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.88), rgba(238,242,247,1) 62%);
    }

    .book-wrap {
      transform: scale(var(--zoom));
      transform-origin: center center;
      transition: transform .18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 18px;
      will-change: transform;
    }

    #flipbook {
      width: min(94vw, 1280px);
      height: min(86vh, 860px);
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.12));
    }

    .page {
      background: #fff;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    .page-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      position: relative;
    }

    .page canvas {
      max-width: 100%;
      max-height: 100%;
      display: block;
      background: #fff;
    }

    .zoom-controls {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 20;
      display: flex;
      gap: 8px;
      direction: ltr;
    }

    .zoom-btn,
    .zoom-indicator {
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,.96);
      color: var(--brand);
      min-width: 44px;
      height: 42px;
      padding: 0 12px;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 2px 10px rgba(0,0,0,.10);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .zoom-btn {
      cursor: pointer;
    }

    .zoom-btn:hover {
      transform: translateY(-1px);
    }

    .zoom-indicator {
      min-width: 72px;
      font-size: 14px;
    }

    .loader {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(238,242,247,.96);
      color: var(--brand);
      font-weight: 700;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border: 4px solid #cbd5e1;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      #flipbook {
        width: 96vw;
        height: 78vh;
      }
    }
  </style>
</head>
<body oncontextmenu="return false">

  <div class="viewer-shell">
    <div class="book-wrap" id="bookWrap">
      <div id="flipbook"></div>
    </div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomOutBtn" aria-label="تصغير">−</button>
    <div class="zoom-indicator" id="zoomInfo">100%</div>
    <button class="zoom-btn" id="zoomInBtn" aria-label="تكبير">＋</button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>جاري تجهيز الكتاب...</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pdfUrl = params.get("file") || "file.pdf";

    const loader = document.getElementById("loader");
    const flipbookEl = document.getElementById("flipbook");
    const zoomInBtn = document.getElementById("zoomInBtn");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const zoomInfo = document.getElementById("zoomInfo");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    let pageFlip = null;
    let zoomLevel = 1;

    function setZoom(value) {
      zoomLevel = Math.min(1.8, Math.max(0.7, value));
      document.documentElement.style.setProperty("--zoom", zoomLevel.toFixed(2));
      zoomInfo.textContent = Math.round(zoomLevel * 100) + "%";
    }

    function createPageElement(contentEl) {
      const page = document.createElement("div");
      page.className = "page";

      const inner = document.createElement("div");
      inner.className = "page-inner";
      inner.appendChild(contentEl);

      page.appendChild(inner);
      return page;
    }

    async function renderPdfToFlipbook(pdf) {
      const pages = [];

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1.65 });
        const outputScale = window.devicePixelRatio || 1;

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d", { alpha: false });

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = Math.floor(viewport.width) + "px";
        canvas.style.height = Math.floor(viewport.height) + "px";

        context.setTransform(outputScale, 0, 0, outputScale, 0, 0);

        await page.render({
          canvasContext: context,
          viewport
        }).promise;

        pages.push(createPageElement(canvas));
      }

      return pages;
    }

    async function initBook() {
      try {
        const loadingTask = pdfjsLib.getDocument(pdfUrl);
        const pdf = await loadingTask.promise;

        const pages = await renderPdfToFlipbook(pdf);

        pageFlip = new St.PageFlip(flipbookEl, {
          width: 560,
          height: 790,
          size: "stretch",
          minWidth: 300,
          maxWidth: 1400,
          minHeight: 380,
          maxHeight: 1800,
          maxShadowOpacity: 0.2,
          showCover: false,
          mobileScrollSupport: false,
          useMouseEvents: true,
          swipeDistance: 22,
          clickEventForward: false,
          showPageCorners: false,
          disableFlipByClick: false,
          startPage: 0,
          autoSize: true,
          usePortrait: false
        });

        pageFlip.loadFromHTML(pages);

        loader.classList.add("hidden");
      } catch (err) {
        console.error(err);
        loader.innerHTML = "<div>تعذر تحميل الملف. تأكد من وجود file.pdf في نفس المستودع.</div>";
      }
    }

    zoomInBtn.addEventListener("click", () => setZoom(zoomLevel + 0.1));
    zoomOutBtn.addEventListener("click", () => setZoom(zoomLevel - 0.1));

    document.addEventListener("keydown", (e) => {
      if (e.key === "+") {
        setZoom(zoomLevel + 0.1);
      } else if (e.key === "-") {
        setZoom(zoomLevel - 0.1);
      }
    });

    setZoom(1);
    initBook();
  </script>
</body>
</html>
