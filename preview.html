<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عرض الملف</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    #pdfContainer {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 10px 30px;
    }

    .page-wrapper {
      background: white;
      margin: 0 auto 18px;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      width: fit-content;
      max-width: 100%;
    }

    .page-wrapper canvas {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      background: white;
    }

    @media (max-width: 768px) {
      #pdfContainer {
        padding: 10px 6px 20px;
      }

      .page-wrapper {
        padding: 6px;
        margin-bottom: 12px;
        border-radius: 6px;
      }
    }
  </style>
</head>
<body>

  <div id="pdfContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const pdfUrl = params.get("file") || "file.pdf";
    const container = document.getElementById("pdfContainer");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    async function renderPDF() {
      try {
        const loadingTask = pdfjsLib.getDocument(pdfUrl);
        const pdf = await loadingTask.promise;

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);

          const unscaledViewport = page.getViewport({ scale: 1 });
          const maxWidth = Math.min(window.innerWidth * 0.95, 1000);
          const scale = maxWidth / unscaledViewport.width;
          const viewport = page.getViewport({ scale });

          const outputScale = window.devicePixelRatio || 1;
          const canvas = document.createElement("canvas");
          const context = canvas.getContext("2d", { alpha: false });

          canvas.width = Math.floor(viewport.width * outputScale);
          canvas.height = Math.floor(viewport.height * outputScale);
          canvas.style.width = Math.floor(viewport.width) + "px";
          canvas.style.height = Math.floor(viewport.height) + "px";

          context.setTransform(outputScale, 0, 0, outputScale, 0, 0);

          const wrapper = document.createElement("div");
          wrapper.className = "page-wrapper";
          wrapper.appendChild(canvas);
          container.appendChild(wrapper);

          await page.render({
            canvasContext: context,
            viewport: viewport
          }).promise;
        }
      } catch (error) {
        console.error(error);
        container.innerHTML = "<div style='text-align:center; padding:40px; color:#b91c1c;'>تعذر تحميل الملف. تأكد من وجود file.pdf في نفس المستودع.</div>";
      }
    }

    renderPDF();
  </script>
</body>
</html>
