<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الكتاب التفاعلي</title>

  <style>
    :root{
      --topbar-h: 64px;
      --sidebar-w: 140px;
      --brand: #0b3d91;
      --bg: #eef2f7;
      --card: #ffffff;
      --text: #10203a;
      --muted: #64748b;
      --border: #dbe3ef;
      --shadow: 0 10px 30px rgba(0,0,0,.10);
      --zoom: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      display: grid;
      grid-template-rows: var(--topbar-h) 1fr;
      direction: rtl;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      background: linear-gradient(135deg, #0b3d91, #1a5fd0);
      color: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,.14);
      z-index: 20;
    }

    .title {
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn, .page-box, .page-jump {
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,.96);
      color: var(--brand);
      min-height: 40px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .btn {
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .page-box {
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .page-jump {
      width: 78px;
      text-align: center;
      outline: none;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 0;
      height: 100%;
    }

    .sidebar {
      background: #f8fbff;
      border-left: 1px solid var(--border);
      overflow: auto;
      padding: 10px;
      box-shadow: inset 6px 0 12px rgba(0,0,0,.03);
    }

    .sidebar-title {
      font-size: 13px;
      color: var(--muted);
      margin: 4px 6px 10px;
      font-weight: 700;
    }

    .thumb-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .thumb {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.05);
      transition: .18s ease;
    }

    .thumb:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,.08);
    }

    .thumb.active {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,.15);
    }

    .thumb canvas,
    .thumb .thumb-cover {
      width: 100%;
      display: block;
      border-radius: 8px;
    }

    .thumb .thumb-cover {
      min-height: 120px;
      background: linear-gradient(135deg, #0b3d91, #1d5ed8);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.7;
      padding: 12px;
    }

    .thumb-label {
      text-align: center;
      margin-top: 7px;
      font-size: 12px;
      color: #334155;
      font-weight: 700;
    }

    .main {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.8), rgba(238,242,247,1) 62%);
    }

    .book-stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      overflow: hidden;
    }

    .book-wrap {
      transform: scale(var(--zoom));
      transform-origin: center center;
      transition: transform .18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform;
    }

    #flipbook {
      width: min(92vw, 1220px);
      height: min(82vh, 820px);
      margin: 0 auto;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,.10));
    }

    .page {
      background: #fff;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    .page-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      position: relative;
    }

    .page canvas {
      max-width: 100%;
      max-height: 100%;
      display: block;
      background: #fff;
    }

    .cover, .end-cover {
      width: 100%;
      height: 100%;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      line-height: 1.9;
      background: linear-gradient(135deg, #0b3d91, #1d5ed8);
    }

    .cover h1, .end-cover h2 {
      margin: 0 0 10px;
    }

    .cover p, .end-cover p {
      margin: 0;
      opacity: .96;
      max-width: 420px;
    }

    .loader {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(238,242,247,.96);
      color: var(--brand);
      font-weight: 700;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border: 4px solid #cbd5e1;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    .hint {
      position: absolute;
      left: 16px;
      bottom: 14px;
      background: rgba(255,255,255,.92);
      color: #334155;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
      z-index: 8;
    }

    @media (max-width: 980px) {
      :root { --sidebar-w: 110px; }

      .topbar {
        min-height: auto;
        height: auto;
        padding: 10px;
        align-items: flex-start;
        flex-direction: column;
      }

      #flipbook {
        width: 95vw;
        height: 76vh;
      }

      .hint {
        display: none;
      }
    }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: absolute;
        top: 0;
        right: 0;
        width: min(82vw, 320px);
        height: 100%;
        z-index: 25;
        border-left: 1px solid var(--border);
        box-shadow: -16px 0 30px rgba(0,0,0,.16);
      }

      .sidebar.hidden-mobile {
        display: none;
      }

      #flipbook {
        width: 96vw;
        height: 72vh;
      }
    }
  </style>
</head>
<body oncontextmenu="return false">

  <div class="topbar">
    <div class="title">📘 الكتاب التفاعلي</div>

    <div class="toolbar">
      <button class="btn" id="toggleThumbsBtn">المصغرات</button>
      <button class="btn" id="fullscreenBtn">ملء الشاشة</button>
      <button class="btn" id="zoomOutBtn">−</button>
      <div class="page-box" id="zoomInfo">100%</div>
      <button class="btn" id="zoomInBtn">＋</button>

      <input class="page-jump" id="pageJumpInput" type="number" min="1" placeholder="صفحة" />
      <button class="btn" id="pageJumpBtn">اذهب</button>

      <button class="btn" id="prevBtn">السابق</button>
      <div class="page-box" id="pageInfo">جاري التحميل...</div>
      <button class="btn" id="nextBtn">التالي</button>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">الصفحات</div>
      <div class="thumb-list" id="thumbList"></div>
    </aside>

    <main class="main">
      <div class="book-stage">
        <div class="book-wrap" id="bookWrap">
          <div id="flipbook"></div>
        </div>
      </div>

      <div class="hint">يمكنك التقليب بالسحب أو بالأزرار</div>

      <div class="loader" id="loader">
        <div class="spinner"></div>
        <div>جاري تجهيز الكتاب التفاعلي...</div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pdfUrl = params.get("file") || "file.pdf";

    const loader = document.getElementById("loader");
    const flipbookEl = document.getElementById("flipbook");
    const thumbList = document.getElementById("thumbList");
    const pageInfo = document.getElementById("pageInfo");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const zoomInBtn = document.getElementById("zoomInBtn");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const zoomInfo = document.getElementById("zoomInfo");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const toggleThumbsBtn = document.getElementById("toggleThumbsBtn");
    const sidebar = document.getElementById("sidebar");
    const pageJumpInput = document.getElementById("pageJumpInput");
    const pageJumpBtn = document.getElementById("pageJumpBtn");
    const bookWrap = document.getElementById("bookWrap");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    let pageFlip = null;
    let pdfPagesCount = 0;
    let zoomLevel = 1;
    let thumbElements = [];
    let pageMap = []; // index => actual pdf page number, 0 cover, last end cover

    function setZoom(value) {
      zoomLevel = Math.min(1.8, Math.max(0.65, value));
      document.documentElement.style.setProperty("--zoom", zoomLevel.toFixed(2));
      zoomInfo.textContent = Math.round(zoomLevel * 100) + "%";
    }

    function createPageElement(contentEl, pageClass = "") {
      const page = document.createElement("div");
      page.className = "page " + pageClass;

      const inner = document.createElement("div");
      inner.className = "page-inner";
      inner.appendChild(contentEl);

      page.appendChild(inner);
      return page;
    }

    function createCover(title, subtitle, end = false) {
      const box = document.createElement("div");
      box.className = end ? "end-cover" : "cover";
      box.innerHTML = end
        ? `<h2>${title}</h2><p>${subtitle}</p>`
        : `<h1>${title}</h1><p>${subtitle}</p>`;
      return createPageElement(box, "hard");
    }

    function addCoverThumb(label) {
      const item = document.createElement("div");
      item.className = "thumb";

      const cover = document.createElement("div");
      cover.className = "thumb-cover";
      cover.textContent = label;

      const text = document.createElement("div");
      text.className = "thumb-label";
      text.textContent = label;

      item.appendChild(cover);
      item.appendChild(text);
      thumbList.appendChild(item);
      thumbElements.push(item);
      return item;
    }

    function addCanvasThumb(canvas, pageNumber, displayIndex) {
      const item = document.createElement("div");
      item.className = "thumb";

      const thumbCanvas = document.createElement("canvas");
      const ctx = thumbCanvas.getContext("2d");

      const targetWidth = 105;
      const scale = targetWidth / canvas.width;
      thumbCanvas.width = Math.round(canvas.width * scale);
      thumbCanvas.height = Math.round(canvas.height * scale);

      ctx.drawImage(canvas, 0, 0, thumbCanvas.width, thumbCanvas.height);

      const text = document.createElement("div");
      text.className = "thumb-label";
      text.textContent = "صفحة " + pageNumber;

      item.appendChild(thumbCanvas);
      item.appendChild(text);
      item.addEventListener("click", () => {
        if (pageFlip) pageFlip.flip(displayIndex);
      });

      thumbList.appendChild(item);
      thumbElements.push(item);
      return item;
    }

    function setActiveThumb(index) {
      thumbElements.forEach(el => el.classList.remove("active"));
      if (thumbElements[index]) thumbElements[index].classList.add("active");
    }

    function updatePageInfo() {
      if (!pageFlip) return;

      const currentIndex = pageFlip.getCurrentPageIndex();
      setActiveThumb(currentIndex);

      if (currentIndex === 0) {
        pageInfo.textContent = "الغلاف";
        return;
      }

      if (currentIndex === pdfPagesCount + 1) {
        pageInfo.textContent = "نهاية الملف";
        return;
      }

      const actualPage = pageMap[currentIndex];
      pageInfo.textContent = `صفحة ${actualPage} من ${pdfPagesCount}`;
    }

    async function renderPdfToFlipbook(pdf) {
      const pages = [];
      thumbList.innerHTML = "";
      thumbElements = [];
      pageMap = [];

      pages.push(
        createCover(
          "الكتاب التفاعلي",
          "افتحه من اليمين واقلب الصفحات بشكل تفاعلي"
        )
      );
      pageMap.push(0);
      const coverThumb = addCoverThumb("الغلاف");
      coverThumb.addEventListener("click", () => {
        if (pageFlip) pageFlip.flip(0);
      });

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1.65 });
        const outputScale = window.devicePixelRatio || 1;

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d", { alpha: false });

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = Math.floor(viewport.width) + "px";
        canvas.style.height = Math.floor(viewport.height) + "px";

        context.setTransform(outputScale, 0, 0, outputScale, 0, 0);

        await page.render({
          canvasContext: context,
          viewport
        }).promise;

        pages.push(createPageElement(canvas));
        pageMap.push(pageNum);
        addCanvasThumb(canvas, pageNum, pageNum);
      }

      pages.push(
        createCover(
          "انتهى العرض",
          "يمكنك الرجوع للصفحات السابقة في أي وقت",
          true
        )
      );
      pageMap.push(-1);
      const endThumb = addCoverThumb("النهاية");
      endThumb.addEventListener("click", () => {
        if (pageFlip) pageFlip.flip(pdf.numPages + 1);
      });

      return pages;
    }

    async function initBook() {
      try {
        const loadingTask = pdfjsLib.getDocument(pdfUrl);
        const pdf = await loadingTask.promise;
        pdfPagesCount = pdf.numPages;

        const pages = await renderPdfToFlipbook(pdf);

        pageFlip = new St.PageFlip(flipbookEl, {
          width: 560,
          height: 790,
          size: "stretch",
          minWidth: 300,
          maxWidth: 1300,
          minHeight: 380,
          maxHeight: 1700,
          maxShadowOpacity: 0.22,
          showCover: true,
          mobileScrollSupport: false,
          useMouseEvents: true,
          swipeDistance: 24,
          clickEventForward: false,
          showPageCorners: true,
          disableFlipByClick: false,
          startPage: 0,
          autoSize: true,
          usePortrait: true
        });

        pageFlip.on("init", updatePageInfo);
        pageFlip.on("flip", updatePageInfo);
        pageFlip.on("update", updatePageInfo);

        pageFlip.loadFromHTML(pages);
        updatePageInfo();

        loader.classList.add("hidden");
      } catch (err) {
        console.error(err);
        loader.innerHTML = "<div>تعذر تحميل الملف. تأكد من وجود file.pdf في نفس المستودع.</div>";
      }
    }

    prevBtn.addEventListener("click", () => {
      if (pageFlip) pageFlip.flipPrev();
    });

    nextBtn.addEventListener("click", () => {
      if (pageFlip) pageFlip.flipNext();
    });

    zoomInBtn.addEventListener("click", () => setZoom(zoomLevel + 0.1));
    zoomOutBtn.addEventListener("click", () => setZoom(zoomLevel - 0.1));

    pageJumpBtn.addEventListener("click", () => {
      if (!pageFlip) return;
      const n = parseInt(pageJumpInput.value, 10);
      if (!Number.isFinite(n)) return;
      if (n < 1 || n > pdfPagesCount) return;
      pageFlip.flip(n);
    });

    pageJumpInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") pageJumpBtn.click();
    });

    toggleThumbsBtn.addEventListener("click", () => {
      if (window.innerWidth <= 760) {
        sidebar.classList.toggle("hidden-mobile");
      } else {
        sidebar.classList.toggle("hidden");
      }
    });

    fullscreenBtn.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (e) {
        console.error(e);
      }
    });

    document.addEventListener("keydown", (e) => {
      if (!pageFlip) return;

      if (e.key === "ArrowRight") {
        pageFlip.flipPrev();
      } else if (e.key === "ArrowLeft") {
        pageFlip.flipNext();
      } else if (e.key === "+") {
        setZoom(zoomLevel + 0.1);
      } else if (e.key === "-") {
        setZoom(zoomLevel - 0.1);
      }
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 760) {
        sidebar.classList.remove("hidden-mobile");
      }
    });

    setZoom(1);
    initBook();
  </script>
</body>
</html>
