<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عارض الملف</title>

  <style>
    :root{
      --brand: #0b3d91;
      --bg: #eef2f7;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: pan-y;
    }

    body {
      position: relative;
    }

    .viewer-shell {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.9), rgba(238,242,247,1) 65%);
      overflow: hidden;
    }

    .page-stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      position: relative;
    }

    .page-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,.12);
      padding: 14px;
      max-width: 96vw;
      max-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      background: #fff;
    }

    .zoom-controls {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 20;
      display: flex;
      gap: 8px;
      direction: ltr;
    }

    .zoom-btn,
    .zoom-indicator {
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,.97);
      color: var(--brand);
      min-width: 44px;
      height: 42px;
      padding: 0 12px;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 2px 10px rgba(0,0,0,.10);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .zoom-btn {
      cursor: pointer;
    }

    .zoom-indicator {
      min-width: 74px;
      font-size: 14px;
    }

    .loader {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(238,242,247,.96);
      color: var(--brand);
      font-weight: 700;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border: 4px solid #cbd5e1;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    .nav-zone {
      position: absolute;
      top: 0;
      width: 18%;
      height: 100%;
      z-index: 10;
      background: transparent;
    }

    .nav-left { left: 0; }
    .nav-right { right: 0; }

    .page-info {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(255,255,255,.93);
      color: #334155;
      border: 1px solid #dbe3ef;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
      direction: rtl;
    }

    @media (max-width: 900px) {
      .page-card {
        max-width: 98vw;
        max-height: 88vh;
        padding: 8px;
      }

      .nav-zone {
        width: 24%;
      }
    }
  </style>
</head>
<body oncontextmenu="return false">

  <div class="viewer-shell">
    <div class="page-stage" id="pageStage">
      <div class="nav-zone nav-left" id="prevZone" aria-hidden="true"></div>
      <div class="nav-zone nav-right" id="nextZone" aria-hidden="true"></div>

      <div class="page-card">
        <canvas id="pdfCanvas"></canvas>
      </div>
    </div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomOutBtn" aria-label="تصغير">−</button>
    <div class="zoom-indicator" id="zoomInfo">100%</div>
    <button class="zoom-btn" id="zoomInBtn" aria-label="تكبير">＋</button>
  </div>

  <div class="page-info" id="pageInfo">جاري التحميل...</div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>جاري تحميل الملف...</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pdfUrl = params.get("file") || "file.pdf";

    const loader = document.getElementById("loader");
    const canvas = document.getElementById("pdfCanvas");
    const ctx = canvas.getContext("2d", { alpha: false });
    const zoomInBtn = document.getElementById("zoomInBtn");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const zoomInfo = document.getElementById("zoomInfo");
    const pageInfo = document.getElementById("pageInfo");
    const prevZone = document.getElementById("prevZone");
    const nextZone = document.getElementById("nextZone");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let zoomLevel = 1;
    let baseScale = 1;
    let isRendering = false;
    let pendingPage = null;
    let touchStartX = 0;
    let touchEndX = 0;

    async function loadPdf() {
      try {
        const loadingTask = pdfjsLib.getDocument({
          url: pdfUrl,
          cMapPacked: true
        });

        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;
        currentPage = 1;

        await renderPage(currentPage);
        loader.classList.add("hidden");
      } catch (err) {
        console.error(err);
        loader.innerHTML = "<div>تعذر تحميل الملف. تأكد من وجود file.pdf في نفس المستودع.</div>";
      }
    }

    async function renderPage(pageNum) {
      if (!pdfDoc) return;

      if (isRendering) {
        pendingPage = pageNum;
        return;
      }

      isRendering = true;

      try {
        const page = await pdfDoc.getPage(pageNum);

        const unscaledViewport = page.getViewport({ scale: 1 });
        const maxWidth = window.innerWidth * 0.9;
        const maxHeight = window.innerHeight * 0.82;

        const fitScale = Math.min(
          maxWidth / unscaledViewport.width,
          maxHeight / unscaledViewport.height
        );

        baseScale = fitScale;
        const finalScale = baseScale * zoomLevel;
        const viewport = page.getViewport({ scale: finalScale });

        const outputScale = window.devicePixelRatio || 1;

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = Math.floor(viewport.width) + "px";
        canvas.style.height = Math.floor(viewport.height) + "px";

        ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        await page.render({
          canvasContext: ctx,
          viewport: viewport
        }).promise;

        pageInfo.textContent = `صفحة ${currentPage} من ${totalPages}`;
        zoomInfo.textContent = Math.round(zoomLevel * 100) + "%";
      } catch (err) {
        console.error(err);
      } finally {
        isRendering = false;
        if (pendingPage !== null) {
          const next = pendingPage;
          pendingPage = null;
          renderPage(next);
        }
      }
    }

    function goToNextPage() {
      if (!pdfDoc || currentPage >= totalPages) return;
      currentPage += 1;
      renderPage(currentPage);
    }

    function goToPrevPage() {
      if (!pdfDoc || currentPage <= 1) return;
      currentPage -= 1;
      renderPage(currentPage);
    }

    function setZoom(value) {
      const newZoom = Math.min(2.2, Math.max(0.7, value));
      if (newZoom === zoomLevel) return;
      zoomLevel = newZoom;
      renderPage(currentPage);
    }

    zoomInBtn.addEventListener("click", () => setZoom(zoomLevel + 0.1));
    zoomOutBtn.addEventListener("click", () => setZoom(zoomLevel - 0.1));

    prevZone.addEventListener("click", goToPrevPage);
    nextZone.addEventListener("click", goToNextPage);

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") {
        goToNextPage();
      } else if (e.key === "ArrowLeft") {
        goToPrevPage();
      } else if (e.key === "+" || e.key === "=") {
        setZoom(zoomLevel + 0.1);
      } else if (e.key === "-") {
        setZoom(zoomLevel - 0.1);
      }
    });

    document.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const delta = touchEndX - touchStartX;

      if (Math.abs(delta) < 40) return;

      if (delta < 0) {
        goToNextPage();
      } else {
        goToPrevPage();
      }
    }, { passive: true });

    let resizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        renderPage(currentPage);
      }, 150);
    });

    loadPdf();
  </script>
</body>
</html>
